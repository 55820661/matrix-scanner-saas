services:
  postgres:
    image: postgres:16-alpine
    container_name: matrix-scanner-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-matrix_scanner}
      POSTGRES_USER: ${POSTGRES_USER:-matrix_scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matrix_scanner}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - matrix_scanner_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matrix_scanner} -d ${POSTGRES_DB:-matrix_scanner}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  matrix_scanner_postgres_data:
